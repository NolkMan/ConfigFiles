# Read `man 5 sway-input` for more information about this section.
# Get inputs with swaymsg -t get_inputs

input type:touchpad {
    dwt enabled
    tap enabled
    natural_scroll enabled
    middle_emulation enabled
}

input type:keyboard {
    xkb_layout "pl"
	xkb_numlock enabled
}

input type:pointer {
	accel_profile flat
	pointer_accel 0.41
}

input "6645:12870:NuPhy_Air60_V2-1_Mouse" {
	accel_profile flat
	pointer_accel -0.8
}

